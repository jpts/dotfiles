{{- $osarch := .osarch }}
{{- $uname_arch := .chezmoi.arch | replace "amd" "x86_" }}
{{- $os_pattern := printf "?%s" (substr 1 (int (len .chezmoi.os)) .chezmoi.os) }}
{{- $os := .chezmoi.os }}

{{- range $k, $v := .binaries}}
{{- $supported_arches := $v | jq "[.arch | keys] | flatten | unique" | toStrings }}
{{- if has $osarch $supported_arches }}
{{- $asset_pattern := .asset_pattern | replace "OS" $os_pattern | replace "UNAME_ARCH" $uname_arch }}
{{ $k }}:
  type: archive-file
  url: {{ gitHubReleaseAssetURL .repo .version $asset_pattern }}
  path: {{ .path | replace "OS" $os | replace "UNAME_ARCH" $uname_arch }}
  targetPath: {{ .targetPath | replace "OS" $os | replace "UNAME_ARCH" $uname_arch }}
  checksum:
    sha256: "{{ index .arch $osarch }}"
{{- end }}
{{- end }}
